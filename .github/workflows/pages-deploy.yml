# .github/workflows/pages-deploy.yml
# Reusable workflow for deploying a download page to GitHub Pages

name: Deploy Download Page to GitHub Pages

on:
  workflow_call:
    inputs:
      package_name:
        description: 'Name of the package to display on the download page'
        required: true
        type: string
      version:
        description: 'Version to display on the download page'
        required: true
        type: string
      is_repo_public:
        default: false
        required: false
        type: boolean
      changelog:
        description: 'Changelog content to display (supports markdown). If empty, fetches from GitHub Release notes.'
        required: false
        type: string
      bundle_id:
        description: 'iOS bundle identifier (e.g. com.example.app). Required for iOS OTA install and AltStore source.'
        required: false
        type: string
      developer_name:
        description: 'Developer name for AltStore source metadata.'
        required: false
        type: string
        default: ''
      app_description:
        description: 'Short app description for AltStore source metadata.'
        required: false
        type: string
        default: ''

jobs:
  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Fetch release notes from GitHub
        id: release-notes
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
          INPUT_CHANGELOG: ${{ inputs.changelog }}
        run: |
          if [ -n "$INPUT_CHANGELOG" ]; then
            # Use provided changelog
            echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
            echo "$INPUT_CHANGELOG" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            # Fetch from GitHub Release API
            RELEASE_NOTES=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/v${VERSION}" \
              | jq -r '.body // empty' 2>/dev/null || echo "")
            
            if [ -z "$RELEASE_NOTES" ]; then
              # Try without 'v' prefix
              RELEASE_NOTES=$(curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${VERSION}" \
                | jq -r '.body // empty' 2>/dev/null || echo "")
            fi
            
            echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
            echo "$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Build download page
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          VERSION: ${{ inputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CHANGELOG: ${{ steps.release-notes.outputs.changelog }}
          IS_REPO_PUBLIC: ${{ inputs.is_repo_public }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
          DEVELOPER_NAME: ${{ inputs.developer_name }}
          APP_DESCRIPTION: ${{ inputs.app_description }}
        run: |
          mkdir -p public

          # Copy binaries to public folder
          cp artifacts/* public/ 2>/dev/null || true

          # Compute GitHub Pages base URL
          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          PAGES_BASE_URL="https://${OWNER}.github.io/${REPO}"

          # Generate manifest.plist for each iOS IPA (OTA install)
          if [ -n "$BUNDLE_ID" ]; then
            for ipa in public/*.ipa; do
              [ -f "$ipa" ] || continue
              IPA_FILENAME=$(basename "$ipa")
              MANIFEST_NAME="${IPA_FILENAME%.ipa}-manifest.plist"
              cat > "public/${MANIFEST_NAME}" << PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>${PAGES_BASE_URL}/${IPA_FILENAME}</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>${BUNDLE_ID}</string>
                  <key>bundle-version</key>
                  <string>${VERSION}</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>${PACKAGE_NAME}</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          PLISTEOF
            done
          fi

          # Generate AltStore source JSON for iOS IPAs
          if [ -n "$BUNDLE_ID" ]; then
            APPS_JSON="[]"
            for ipa in public/*.ipa; do
              [ -f "$ipa" ] || continue
              # Skip simulator builds
              echo "$ipa" | grep -q "simulator" && continue
              IPA_FILENAME=$(basename "$ipa")
              IPA_SIZE=$(stat -c%s "$ipa" 2>/dev/null || stat -f%z "$ipa" 2>/dev/null || echo "0")
              VERSION_DATE=$(date -u +"%Y-%m-%d")
              DOWNLOAD_URL="${PAGES_BASE_URL}/${IPA_FILENAME}"
              DEV_NAME="${DEVELOPER_NAME:-${OWNER}}"
              DESC="${APP_DESCRIPTION:-${PACKAGE_NAME} v${VERSION}}"
              APPS_JSON=$(echo "$APPS_JSON" | jq \
                --arg name "$PACKAGE_NAME" \
                --arg bid "$BUNDLE_ID" \
                --arg dev "$DEV_NAME" \
                --arg ver "$VERSION" \
                --arg date "$VERSION_DATE" \
                --arg url "$DOWNLOAD_URL" \
                --arg desc "$DESC" \
                --argjson size "$IPA_SIZE" \
                '. + [{
                  name: $name,
                  bundleIdentifier: $bid,
                  developerName: $dev,
                  version: $ver,
                  versionDate: $date,
                  downloadURL: $url,
                  localizedDescription: $desc,
                  size: $size
                }]')
            done
            # Only write source if we found IPAs
            if [ "$(echo "$APPS_JSON" | jq 'length')" -gt 0 ]; then
              jq -n \
                --arg name "${PACKAGE_NAME}" \
                --arg identifier "${BUNDLE_ID}.source" \
                --argjson apps "$APPS_JSON" \
                '{
                  name: $name,
                  identifier: $identifier,
                  sourceURL: "",
                  apps: $apps
                }' > public/altstore-source.json
              # Patch sourceURL with the actual URL
              SOURCE_URL="${PAGES_BASE_URL}/altstore-source.json"
              jq --arg url "$SOURCE_URL" '.sourceURL = $url' public/altstore-source.json > public/altstore-source.tmp && mv public/altstore-source.tmp public/altstore-source.json
            fi
          fi

          # Generate download page
          cat > public/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>PACKAGE_NAME_PLACEHOLDER - Downloads</title>
            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #e4e4e4; }
              .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
              header { text-align: center; padding: 3rem 0; }
              h1 { font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
              .version { color: #888; font-size: 1.1rem; }
              .section { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 2rem; margin-top: 2rem; }
              .section h2 { margin-bottom: 1.5rem; color: #00d9ff; }
              .download-list { list-style: none; }
              .download-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; margin-bottom: 1rem; transition: all 0.2s; }
              .download-item:hover { background: rgba(255,255,255,0.08); border-color: #00d9ff; }
              .download-link { display: flex; align-items: center; padding: 1rem 1.5rem; color: #e4e4e4; text-decoration: none; }
              .platform { font-weight: 600; flex: 1; }
              .filename { color: #888; font-size: 0.9rem; }
              .icon { font-size: 1.5rem; margin-right: 1rem; }
              .install-badge { background: linear-gradient(90deg, #00d9ff, #00ff88); color: #1a1a2e; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 0.5rem; white-space: nowrap; }
              .install-section { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
              .install-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.8rem 1.5rem; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: all 0.2s; }
              .install-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
              .install-btn-altstore { background: linear-gradient(135deg, #5AC8FA, #007AFF); color: #fff; }
              .install-btn-ota { background: linear-gradient(135deg, #34C759, #30D158); color: #fff; }
              .install-btn-android { background: linear-gradient(135deg, #3DDC84, #00C853); color: #1a1a2e; }
              .install-hint { color: #666; font-size: 0.8rem; margin-top: 0.5rem; }
              .separator { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 1.5rem 0; }
              .changelog { line-height: 1.6; }
              .changelog h1, .changelog h2, .changelog h3 { color: #00d9ff; margin: 1.5rem 0 0.75rem 0; }
              .changelog h1:first-child, .changelog h2:first-child, .changelog h3:first-child { margin-top: 0; }
              .changelog ul, .changelog ol { margin-left: 1.5rem; margin-bottom: 1rem; }
              .changelog li { margin-bottom: 0.5rem; }
              .changelog code { background: rgba(0,217,255,0.1); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
              .changelog pre { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
              .changelog pre code { background: none; padding: 0; }
              .changelog a { color: #00d9ff; }
              .changelog p { margin-bottom: 1rem; }
              .changelog blockquote { border-left: 3px solid #00d9ff; padding-left: 1rem; margin: 1rem 0; color: #aaa; }
              footer { text-align: center; padding: 2rem 0; color: #666; font-size: 0.9rem; }
              footer a { color: #00d9ff; text-decoration: none; }
              .empty-changelog { color: #666; font-style: italic; }
            </style>
          </head>
          <body>
            <div class="container">
              <header>
                <h1>PACKAGE_NAME_PLACEHOLDER</h1>
                <p class="version">Version VERSION_PLACEHOLDER</p>
              </header>
              <section class="section">
                <h2>📦 Install</h2>
                <div id="install-buttons" class="install-section"></div>
                <div id="install-hints"></div>
                <hr class="separator" id="install-separator" style="display:none;">
                <ul class="download-list" id="downloads"></ul>
              </section>
              <section class="section" id="changelog-section">
                <h2>📋 Changelog</h2>
                <div class="changelog" id="changelog"></div>
              </section>
              <footer id="footer">
                <p>View on <a href="https://github.com/REPO_PLACEHOLDER/releases">GitHub Releases</a></p>
              </footer>
            </div>
            <script>
              const files = FILELIST_PLACEHOLDER;
              const pagesBaseUrl = 'PAGES_BASE_URL_PLACEHOLDER';
              const platforms = {
                'x86_64-pc-windows-msvc': { name: 'Windows (x64)', icon: '🪟' },
                'x86_64-unknown-linux-gnu': { name: 'Linux (x64)', icon: '🐧' },
                'aarch64-unknown-linux-gnu': { name: 'Linux (ARM64)', icon: '🐧' },
                'aarch64-apple-darwin': { name: 'macOS (Apple Silicon)', icon: '🍎' },
                'x86_64-apple-darwin': { name: 'macOS (Intel)', icon: '🍎' },
                'arm64-v8a': { name: 'Android (ARM64)', icon: '🤖' },
                'armeabi-v7a': { name: 'Android (ARM)', icon: '🤖' },
                'x86_64.apk': { name: 'Android (x86_64)', icon: '🤖' },
                'device': { name: 'iOS (Device)', icon: '📱' },
                'simulator': { name: 'iOS (Simulator)', icon: '📱' },
                'windows': { name: 'Windows', icon: '🪟' },
                'linux': { name: 'Linux', icon: '🐧' },
              };
              const list = document.getElementById('downloads');
              const installBtns = document.getElementById('install-buttons');
              const installHints = document.getElementById('install-hints');
              const installSep = document.getElementById('install-separator');
              const hasAltStoreSource = files.includes('altstore-source.json');
              const hasIosDevice = files.some(f => f.endsWith('.ipa') && f.includes('device'));
              const hasAndroid = files.some(f => f.endsWith('.apk'));
              const hasIosManifest = files.some(f => f.endsWith('-manifest.plist'));

              let hasInstallButtons = false;

              // AltStore button (iOS - free, no dev account needed)
              if (hasAltStoreSource && hasIosDevice) {
                const sourceUrl = encodeURIComponent(pagesBaseUrl + '/altstore-source.json');
                const btn = document.createElement('a');
                btn.href = 'altstore://source?url=' + sourceUrl;
                btn.className = 'install-btn install-btn-altstore';
                btn.innerHTML = '📱 Add to AltStore';
                installBtns.appendChild(btn);
                hasInstallButtons = true;
              }

              // OTA install button (iOS - requires signed IPA)
              if (hasIosManifest && hasIosDevice) {
                const ipaFile = files.find(f => f.endsWith('.ipa') && f.includes('device'));
                if (ipaFile) {
                  const manifestFile = ipaFile.replace('.ipa', '-manifest.plist');
                  if (files.includes(manifestFile)) {
                    const manifestUrl = encodeURIComponent(pagesBaseUrl + '/' + manifestFile);
                    const btn = document.createElement('a');
                    btn.href = 'itms-services://?action=download-manifest&url=' + manifestUrl;
                    btn.className = 'install-btn install-btn-ota';
                    btn.innerHTML = '📱 Install on iOS';
                    installBtns.appendChild(btn);
                    hasInstallButtons = true;
                  }
                }
              }

              // Android direct install button
              if (hasAndroid) {
                const apkFile = files.find(f => f.endsWith('.apk') && (f.includes('arm64') || f.includes('arm64-v8a'))) || files.find(f => f.endsWith('.apk'));
                if (apkFile) {
                  const btn = document.createElement('a');
                  btn.href = apkFile;
                  btn.className = 'install-btn install-btn-android';
                  btn.innerHTML = '🤖 Install on Android';
                  installBtns.appendChild(btn);
                  hasInstallButtons = true;
                }
              }

              // Show hints and separator if we have install buttons
              if (hasInstallButtons) {
                installSep.style.display = 'block';
                const hints = [];
                if (hasAltStoreSource) hints.push('AltStore: install <a href="https://altstore.io" style="color:#5AC8FA">AltStore</a> first, then tap the button above.');
                if (hasIosManifest) hints.push('iOS direct install requires a signed IPA (Apple Developer account).');
                if (hasAndroid) hints.push('Android: allow install from unknown sources when prompted.');
                if (hints.length > 0) {
                  installHints.innerHTML = hints.map(h => '<p class="install-hint">' + h + '</p>').join('');
                }
              }

              // Filter out manifest.plist and altstore-source.json from download list
              const displayFiles = files.filter(f => !f.endsWith('-manifest.plist') && f !== 'altstore-source.json');
              for (const file of displayFiles) {
                let platform = Object.keys(platforms).find(p => file.includes(p)) || 'unknown';
                // Special handling for APK files
                if (file.endsWith('.apk') && platform === 'unknown') {
                  platform = 'arm64-v8a'; // Default Android
                }
                const info = platforms[platform] || { name: 'Other', icon: '📁' };
                const li = document.createElement('li');
                li.className = 'download-item';
                li.innerHTML = `<a href="${file}" class="download-link"><span class="icon">${info.icon}</span><span class="platform">${info.name}</span><span class="filename">${file}</span></a>`;
                list.appendChild(li);
              }

              // Render changelog
              const changelogContent = `CHANGELOG_PLACEHOLDER`;
              const changelogEl = document.getElementById('changelog');
              const changelogSection = document.getElementById('changelog-section');
              if (changelogContent && typeof changelogContent === 'string' && changelogContent.trim().length > 0) {
                try {
                  changelogEl.innerHTML = marked.parse(changelogContent);
                } catch (e) {
                  changelogSection.style.display = 'none';
                }
              } else {
                changelogSection.style.display = 'none';
              }

              const isPublic = IS_REPO_PUBLIC_PLACEHOLDER;
              const footer = document.getElementById('footer');
              if (!isPublic) {
                footer.style.display = 'none';
              }
            </script>
          </body>
          </html>
          HTMLEOF

          # Replace placeholders
          FILELIST=$(ls public/ | grep -v index.html | jq -R -s -c 'split("\n") | map(select(length > 0))')

          # Safely encode changelog as JSON (handles newlines, quotes, special chars)
          # Check if changelog has actual content (not just whitespace/newlines)
          CHANGELOG_TRIMMED=$(printf '%s' "$CHANGELOG" | tr -d '[:space:]')
          if [ -n "$CHANGELOG_TRIMMED" ]; then
            CHANGELOG_JSON=$(printf '%s' "$CHANGELOG" | jq -Rs '.')
          else
            CHANGELOG_JSON='null'
          fi

          sed -i "s|PACKAGE_NAME_PLACEHOLDER|${PACKAGE_NAME}|g" public/index.html
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" public/index.html
          sed -i "s|REPO_PLACEHOLDER|${GITHUB_REPOSITORY}|g" public/index.html
          sed -i "s|FILELIST_PLACEHOLDER|${FILELIST}|g" public/index.html
          sed -i "s|CHANGELOG_PLACEHOLDER|${CHANGELOG_JSON}|g" public/index.html
          sed -i "s|IS_REPO_PUBLIC_PLACEHOLDER|${IS_REPO_PUBLIC}|g" public/index.html
          sed -i "s|PAGES_BASE_URL_PLACEHOLDER|${PAGES_BASE_URL}|g" public/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create Pages archive
        run: tar --dereference --hard-dereference --directory public -cf "$RUNNER_TEMP/artifact.tar" .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          overwrite: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
